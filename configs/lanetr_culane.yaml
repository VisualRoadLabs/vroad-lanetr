# Config de referencia del modelo congelado LaneTR (CULane).
# Es la misma config efectiva que DEFAULT_CONFIG en lanetr/contract/spec.py.
# La sección `model` es la ARQUITECTURA CONGELADA: no se toca (no se barre).
# La plataforma ML Training fusiona esto con los overrides --set del formulario (CONFIG_SCHEMA).
name: lanetr_dla34_culane

model:                    # CONGELADO — no se expone en el formulario
  backbone: dla34
  pretrained: true
  d_model: 256
  num_queries: 12
  num_layers: 6
  num_rows: 144
  nhead: 8
  dim_ff: 1024
  n_points: 4             # puntos de muestreo por punto de referencia (deformable)
  img_w: 800
  img_h: 320

data:
  img_w: 800
  img_h: 320
  num_rows: 144
  batch_size: 32          # A100/L4 según el tier
  num_workers: 8
  augment: true
  crop_top_ratio: 0.4576271186440678   # 270/590: franja de cielo recortada (= CULane); vale para cualquier resolución

optim:
  lr: 2.0e-4              # transformer/cabezas
  weight_decay: 1.0e-4
  backbone_mult: 0.1      # backbone a 0.1x
  slow_mult: 0.1          # deformable + anclas a 0.1x

loss:
  w_cls: 2.0
  w_iou: 4.0              # LaneIoU domina (como CLRerNet)
  w_xy: 0.2
  w_ext: 0.5
  focal_alpha: 0.25
  focal_gamma: 2.0
  w_theta: 0.0            # término auxiliar de ángulo (off)
  w_smooth: 0.0           # regularizador de suavidad (off)

schedule:
  epochs: 15              # ~50 para el número final con EMA
  warmup_iters: 1000
  grad_clip: 0.1

ema:
  enabled: true
  decay: 0.9999           # = momentum 1e-4 de CLRerNet
  tau: 2000.0

train:
  amp: true               # bf16 autocast (sin GradScaler)
  channels_last: true
  freeze_bn: true         # FrozenBatchNorm en el backbone
  seed: 0
  eval_conf_thresh: 0.5
